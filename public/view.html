<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>eCustoms Services Portal - Verify QR</title>
    <style>
        :root {
            --primary-teal: #5682c2;
            --accent-yellow: #f5c842;
            --bg-header: #fff;
            --text-color: #333;
            --border-color: #d1d9e6;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: white !important;
            color: var(--text-color); 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .pdf-viewer-wrapper {
            /* max-width: 800px; */
            background-color: white !important;
            height: 100vh;
        }

        .pdf-viewer-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
            padding: 8px 20px; 
            background: #fff; 
            font-size: 14px; 
            border-bottom: 1px solid var(--border-color);
        }

        .lang-switch { 
            cursor: pointer; 
            color: #555; 
            text-decoration: none; 
            display: flex;
            align-items: center;
            gap: 5px;
            user-select: none;
        }

        .lang-switch:hover {
            color: var(--primary-teal);
        }

        .lang-active {
            font-weight: 600;
            color: #000;
        }

        .chevron {
            font-size: 10px;
            margin-left: 2px;
        }

        [dir="rtl"] .chevron {
            margin-left: 0;
            margin-right: 2px;
        }

        /* Header */
        .header-main { 
            background: var(--bg-header); 
            text-align: center; 
            padding: 25px 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            position: relative; 
            border-bottom: 1px solid var(--border-color);
            width: 800px;
        }

        .logos-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            margin-bottom: 20px; 
        }

        .flex-cont {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            height: 90px;
            object-fit: contain;
        }

        .divider { 
            width: 2px; 
            height: 70px; 
            background: #bdc3c7; 
        }

        .portal-title { 
            color: var(--primary-teal); 
            font-size: 26px; 
            font-weight: 500; 
            margin: 0; 
            padding-bottom: 6px; 
            display: inline-block; 
            letter-spacing: 0.5px;
        }

        /* Section Bar */
        .section-bar { 
            background: var(--accent-yellow); 
            padding: 12px 25px; 
            display: flex; 
            align-items: center; 
            font-weight: 600; 
            font-size: 16px; 
            color: #222; 
            width: 800px;
        }

        .section-bar svg { 
            width: 20px; 
            height: 20px; 
            margin-right: 12px; 
            transition: transform 0.3s; 
        }

        [dir="rtl"] .section-bar svg { 
            margin-right: 0; 
            margin-left: 12px; 
            transform: scaleX(-1); 
        }

        /* PDF Viewer Container */
        .content-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            width: 800px; 
            background: #f9f9f9;
            padding: 12px 25px;
        }

        .pdf-container { 
            flex: 1; 
            border: none; 
        }

        .error-message { 
            text-align: center; 
            padding: 60px 20px; 
            color: #d9534f; 
            font-size: 18px; 
            background: #fff;
            margin-top: 20px;
        }

        .content-area, .content-area iframe {
            height: 500px;
        }
        
        /* Use max-device-width to target phone screens even when viewport is 800px */
        @media screen and (max-device-width: 768px) {
            .pdf-viewer-wrapper {
                align-items: normal;
                justify-content: normal;
                height: 50vh;
            }
        }
/* 
        @media screen and (max-width: 576px) {
            .pdf-viewer-wrapper, .header-main, .section-bar, .content-area {
                width: 100%;
            }

            .header-main{ 
                padding-left: 0;
                padding-right: 0;
            }

            .header-main .logos-container #banner-img {
                width: 100%;
            }
            .section-bar {
                justify-content: center !important;
                padding-right: 0;
                padding-left: 0;
            }
            .content-area{
                padding-right: 0;
                padding-left: 0;
            }
            .portal-title {
                font-size: 18px;
            }

        } */
    </style>
</head>
<body>
    <div class="pdf-viewer-wrapper">

    <!-- Main Header -->
    <header class="header-main">
        
        <div class="logos-container">
            <img id="banner-img" src="https://www.customs.gov.om/esw/javax.faces.resource/esw-header-banner.jpg.xhtml?ln=imgs" />
        </div>
        <div class="flex-cont">
            <div></div>
            <h1 class="portal-title" id="portal-title-text">eCustoms Services Portal</h1>

            <div class="lang-switch" onclick="toggleLanguage()">
                <span id="lang-text-en" class="lang-active">English</span> 
                <span>|</span> 
                <span id="lang-text-ar">العربية</span> 
                <span class="chevron">▼</span>
            </div>
        </div>
    </header>

    <!-- Accent Bar -->
    <div class="section-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span id="section-title-text">Verify Scanned QR Code Print</span>
    </div>

    <!-- Dynamic Content Area -->
    <div class="content-area" id="content-area">
        <!-- PDF Iframe or Error Message will be injected here -->
    </div>
</div>

    <script>
        // Language Dictionary
        const translations = {
            en: {
                title: "eCustoms Services Portal",
                section: "Verify Scanned QR Code Print",
                error: "No certificate identifier provided. Please scan a valid QR code.",
                bannerImg: "https://www.customs.gov.om/esw/javax.faces.resource/esw-header-banner.jpg.xhtml?ln=imgs"
            },
            ar: {
                title: "بوابة خدمات الجمارك الإلكترونية",
                section: "التحقق من طباعة رمز الاستجابة السريعة (QR) الممسوح ضوئياً",
                error: "لم يتم توفير معرف الشهادة. يرجى مسح رمز QR صالح.",
                bannerImg: "https://www.customs.gov.om/esw/javax.faces.resource/esw-header-banner_ar.jpg.xhtml?ln=imgs"
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const textData = translations[currentLang];
            
            // Update Texts
            document.getElementById('portal-title-text').textContent = textData.title;
            document.getElementById('section-title-text').textContent = textData.section;
            
            const errorEl = document.getElementById('error-msg');
            if (errorEl) {
                errorEl.textContent = textData.error;
            }

            // Update Active Lang UI
            const langEn = document.getElementById('lang-text-en');
            const langAr = document.getElementById('lang-text-ar');
            if (currentLang === 'en') {
                langEn.classList.add('lang-active');
                langAr.classList.remove('lang-active');
            } else {
                langEn.classList.remove('lang-active');
                langAr.classList.add('lang-active');
            }

            // Update Document Direction
            document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', currentLang);

            // Swap Banner Image
            document.getElementById('banner-img').src = textData.bannerImg;
        }

        // Initialize Page
        window.addEventListener('DOMContentLoaded', () => {
            let certId = '';
            
            // First check path param, e.g. /view/port-clearance-ABC-123
            const pathParts = window.location.pathname.split('/');
            const viewIndex = pathParts.findIndex(part => part === 'view');
            if (viewIndex !== -1 && pathParts.length > viewIndex + 1 && pathParts[viewIndex + 1]) {
                certId = pathParts[viewIndex + 1];
            } else {
                // Fallback to query param
                const urlParams = new URLSearchParams(window.location.search);
                certId = urlParams.get('cert') || urlParams.get('serialNo');
            }

            const contentArea = document.getElementById('content-area');

            if (certId && certId.trim() !== '') {
                // Normalize certId to use in the exact format your PDF is saved.
                // Assuming it's typically saved as `port-clearance-XXXXX.pdf`
                let safeCertId = certId.trim();
                
                // If it doesn't already have the prefix, add it, because the route serves from `/pdfs/port-clearance-UUID.pdf`
                let filename = safeCertId;
                if (!filename.startsWith('port-clearance-')) {
                    filename = `port-clearance-${filename}`;
                }
                if (!filename.endsWith('.pdf')) {
                    filename = `${filename}.pdf`;
                }

                // Directly construct the iframe to load the PDF from your GET /pdfs/:filename route
                const iframe = document.createElement('iframe');
                iframe.src = `/pdfs/${filename}`;
                iframe.className = 'pdf-container';
                iframe.title = 'Certificate PDF Viewer';
                contentArea.appendChild(iframe);
            } else {
                // Show Error immediately
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.id = 'error-msg';
                errorDiv.textContent = translations[currentLang].error;
                contentArea.appendChild(errorDiv);
            }
        });
    </script>
</body>
</html>
