<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800">
    <title>eCustoms Services Portal - Verify QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #0066cc;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-box {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .status-icon {
            width: 40px;
            height: 40px;
            background: #4caf50;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            font-weight: bold;
        }

        .status-content h3 {
            font-size: 16px;
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .status-content p {
            font-size: 14px;
            color: #558b2f;
            line-height: 1.4;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table tr {
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 16px 0;
            font-size: 14px;
        }

        .data-table td:first-child {
            color: #666;
            font-weight: 500;
            width: 40%;
        }

        .data-table td:last-child {
            color: #333;
            font-weight: 600;
            text-align: right;
        }

        .error-box {
            background: #ffebee;
            border: 2px solid #f44336;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #c62828;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 12px;
            color: #0066cc;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 20px;
            }

            .title {
                font-size: 20px;
            }

            .data-table td {
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>
    <!-- <div class="lang-switch" onclick="toggleLanguage()" style="cursor: pointer; user-select: none;">
        <span id="lang-text-en" style="font-weight: 600;">English</span> | <span id="lang-text-ar">العربية</span>
    </div> -->

    <div class="container" id="main-content">
        <h1 class="title" id="page-title">EXIT PERMIT Verification</h1>
        <div id="content-area">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "EXIT PERMIT Verification",
                validStatus: "VALID EXIT PERMIT",
                validMessage: "This exit permit is currently valid and active.",
                permitId: "Permit ID",
                vessel: "Vessel",
                imo: "IMO",
                port: "Port",
                arrivalDate: "Arrival Date",
                departureDate: "Departure Date",
                loading: "Loading permit information...",
                error: "Unable to load permit information. Please check the QR code and try again."
            },
            ar: {
                title: "التحقق من رخصة المغادرة",
                validStatus: "رخصة المغادرة سارية",
                validMessage: "رخصة المغادرة هذه سارية وفعالة حالياً.",
                permitId: "رقم الرخصة",
                vessel: "السفينة",
                imo: "رقم منظمة البحرية الدولية",
                port: "الميناء",
                arrivalDate: "تاريخ الوصول",
                departureDate: "تاريخ المغادرة",
                loading: "جاري تحميل معلومات الرخصة...",
                error: "لا يمكن تحميل معلومات الرخصة. يرجى التحقق من رمز الاستجابة السريعة والمحاولة مجدداً."
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', currentLang);
            renderContent();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                if (currentLang === 'ar') {
                    return date.toLocaleDateString('ar-SA');
                } else {
                    return date.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
                }
            } catch {
                return dateStr;
            }
        }

        function renderContent(data = null) {
            const contentArea = document.getElementById('content-area');
            const t = translations[currentLang];
            document.getElementById('page-title').textContent = t.title;

            if (data) {
                const html = `
                    <div class="status-box">
                        <div class="status-icon">✓</div>
                        <div class="status-content">
                            <h3>${t.validStatus}</h3>
                            <p>${t.validMessage}</p>
                        </div>
                    </div>

                    <table class="data-table">
                        <tr>
                            <td>${t.permitId}</td>
                            <td>${data.PERMIT_NUMBER || '-'}</td>
                        </tr>
                        <tr>
                            <td>${t.vessel}</td>
                            <td>${data.VESSEL_NAME || '-'}</td>
                        </tr>
                        <tr>
                            <td>${t.imo}</td>
                            <td>${data.VESSEL_IMO || '-'}</td>
                        </tr>
                        <tr>
                            <td>${t.port}</td>
                            <td>${data.DEPARTURE_PORT || '-'}</td>
                        </tr>
                        <tr>
                            <td>${t.arrivalDate}</td>
                            <td>${formatDate(data.ARRIVAL_DATE)}</td>
                        </tr>
                        <tr>
                            <td>${t.departureDate}</td>
                            <td>${formatDate(data.DEPARTURE_DATE)}</td>
                        </tr>
                    </table>
                `;
                contentArea.innerHTML = html;
            } else if (data === null) {
                contentArea.innerHTML = `<div class="loading">${t.loading}</div>`;
            } else {
                contentArea.innerHTML = `<div class="error-box">${t.error}</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Get document ID from URL path (e.g., /view/69dfa31566bb069ea2aed4a5)
            let docId = '';
            const pathParts = window.location.pathname.split('/');
            const viewIndex = pathParts.findIndex(part => part === 'view');
            if (viewIndex !== -1 && pathParts.length > viewIndex + 1) {
                docId = pathParts[viewIndex + 1];
            } else {
                const params = new URLSearchParams(window.location.search);
                docId = params.get('id') || params.get('cert') || params.get('serialNo');
            }

            if (!docId) {
                renderContent(false);
                return;
            }

            try {
                renderContent(null); // Show loading
                
                // Fetch document from public API endpoint
                const response = await fetch(`/api/documents/public/${docId}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.document && result.document.formData) {
                        // Extract formData from the document
                        renderContent(result.document.formData);
                    } else {
                        renderContent(false);
                    }
                } else {
                    renderContent(false);
                }
            } catch (error) {
                console.error('Error fetching document:', error);
                renderContent(false);
            }
        });
    </script>
        
    </script>
</body>
</html>
